apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply plugin: "com.google.gms.google-services"
apply plugin: 'com.google.firebase.crashlytics'

project.ext.envConfigFiles = [
    development: ".env.development",
    envTesting: ".env.testing",
    staging: ".env.staging",
    production: ".env.production"
]

ext {
    RNJWPlayerUseGoogleCast = true
}

react {
    autolinkLibrariesWithApp()
}

def enableProguardInReleaseBuilds = false
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

configurations.all {
    resolutionStrategy.force(
        "com.google.android.gms:play-services-cast-framework:21.5.0"
    )
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }

        debugTesting {
            storeFile file('debugTesting.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            storeFile file(MYAPP_UPLOAD_STORE_FILE)
            storePassword MYAPP_UPLOAD_STORE_PASSWORD
            keyAlias MYAPP_UPLOAD_KEY_ALIAS
            keyPassword MYAPP_UPLOAD_KEY_PASSWORD
        }
    }

    flavorDimensions "default"
    productFlavors {
        development {
            minSdkVersion rootProject.ext.minSdkVersion
            applicationId "com.nmas.supernova.development"
            targetSdkVersion rootProject.ext.targetSdkVersion
            signingConfig signingConfigs.debug
        }
        envTesting {
            minSdkVersion rootProject.ext.minSdkVersion
            applicationId "com.nmas.supernova.testing"
            targetSdkVersion rootProject.ext.targetSdkVersion
            signingConfig signingConfigs.debugTesting
        }
        staging {
            minSdkVersion rootProject.ext.minSdkVersion
            applicationId "com.nmas.supernova.staging"
            targetSdkVersion rootProject.ext.targetSdkVersion
            signingConfig signingConfigs.release
        }
        production {
            minSdkVersion rootProject.ext.minSdkVersion
            applicationId "com.nmas.supernova"
            targetSdkVersion rootProject.ext.targetSdkVersion
            signingConfig signingConfigs.release
        }
    }

    namespace "com.nmas.supernova"

    defaultConfig {
        applicationId "com.nmas.supernova"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
        resValue "string", "build_config_package", "com.nmas.supernova"
    }
    buildTypes {
        debug {
            signingConfig null
        }
        release {
            signingConfig null
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    implementation 'com.facebook.fresco:animated-gif:3.4.0'
    implementation("com.facebook.react:react-android")
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation ("com.facebook.android:facebook-android-sdk:latest.release")
    implementation "com.google.android.gms:play-services-cast-framework:21.5.0"
    
    // Google Ad Manager SDK (using version compatible with Kotlin 2.0.x)
    implementation("com.google.android.gms:play-services-ads:23.6.0")
    implementation "androidx.work:work-runtime-ktx:2.9.0"
    
    // Kotlin Coroutines for async SDK initialization
    implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

apply from: project(':react-native-config').projectDir.getPath() + "/dotenv.gradle"

android {
    defaultConfig {
        manifestPlaceholders = [
            DEEPLINK_HOST: project.env.get("DEEPLINK_HOST") ?: "",
            GAM_APPLICATION_ID: project.env.get("GAM_APPLICATION_ID") ?: ""
        ]
    }
}
